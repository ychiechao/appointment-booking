<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>服務預約系統</title>
<style>
  :root {
    --primary: #4F46E5;
    --primary-light: #EEF2FF;
    --primary-dark: #3730A3;
    --success: #10B981;
    --warning: #F59E0B;
    --danger: #EF4444;
    --gray-50: #F9FAFB;
    --gray-100: #F3F4F6;
    --gray-200: #E5E7EB;
    --gray-400: #9CA3AF;
    --gray-600: #4B5563;
    --gray-800: #1F2937;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--gray-50); color: var(--gray-800); min-height: 100vh; }

  /* NAV */
  nav { background: white; border-bottom: 1px solid var(--gray-200); padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .nav-brand { font-weight: 700; font-size: 1.1rem; color: var(--primary); display: flex; align-items: center; gap: .5rem; }
  .nav-user { display: flex; align-items: center; gap: .75rem; }
  .avatar { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary-light); }
  .avatar-placeholder { width: 34px; height: 34px; border-radius: 50%; background: var(--primary-light); color: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: .85rem; }
  .nav-name { font-size: .9rem; font-weight: 500; }
  .badge-admin { background: var(--primary); color: white; font-size: .65rem; padding: 2px 6px; border-radius: 9999px; font-weight: 600; }
  .tab-nav { display: flex; gap: 0; }
  .tab-btn { padding: .4rem .85rem; border: none; background: none; cursor: pointer; font-size: .88rem; color: var(--gray-600); border-bottom: 2px solid transparent; transition: all .15s; }
  .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }

  /* LAYOUT */
  main { max-width: 800px; margin: 0 auto; padding: 1.5rem 1rem; }
  .page { display: none; }
  .page.active { display: block; }

  /* CARDS */
  .card { background: white; border-radius: 12px; border: 1px solid var(--gray-200); padding: 1.25rem; margin-bottom: 1rem; }
  .card-title { font-size: .85rem; font-weight: 600; color: var(--gray-600); text-transform: uppercase; letter-spacing: .05em; margin-bottom: .75rem; }

  /* ANNOUNCEMENT */
  .announcement { background: linear-gradient(135deg, var(--primary-light), #E0E7FF); border-left: 3px solid var(--primary); border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
  .announcement h3 { font-size: .9rem; font-weight: 600; color: var(--primary-dark); margin-bottom: .25rem; }
  .announcement p { font-size: .88rem; color: var(--gray-600); }

  /* CALENDAR */
  .calendar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
  .calendar-header h3 { font-size: 1rem; font-weight: 600; }
  .cal-nav { background: none; border: 1px solid var(--gray-200); border-radius: 6px; width: 30px; height: 30px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; }
  .cal-nav:hover { background: var(--gray-100); }
  .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-day-name { text-align: center; font-size: .75rem; color: var(--gray-400); padding: .25rem 0; font-weight: 500; }
  .cal-day { text-align: center; padding: .4rem .2rem; border-radius: 8px; cursor: pointer; font-size: .9rem; transition: all .15s; }
  .cal-day:hover:not(.disabled):not(.empty) { background: var(--primary-light); }
  .cal-day.selected { background: var(--primary); color: white; font-weight: 600; }
  .cal-day.today { border: 2px solid var(--primary); font-weight: 600; }
  .cal-day.disabled { color: var(--gray-400); cursor: not-allowed; }
  .cal-day.empty { cursor: default; }
  .cal-day.has-slots::after { content: ''; display: block; width: 5px; height: 5px; background: var(--success); border-radius: 50%; margin: 2px auto 0; }
  .cal-day.selected::after { background: white; }

  /* SLOTS */
  .slots-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: .5rem; }
  .slot { padding: .45rem .5rem; border-radius: 8px; text-align: center; font-size: .88rem; font-weight: 500; cursor: pointer; border: 1.5px solid transparent; transition: all .15s; }
  .slot.available { border-color: var(--success); color: var(--success); background: #F0FDF4; }
  .slot.available:hover { background: var(--success); color: white; }
  .slot.available.selected { background: var(--success); color: white; }
  .slot.booked { border-color: var(--gray-200); color: var(--gray-400); background: var(--gray-100); cursor: not-allowed; }
  .slot.mine { border-color: var(--primary); color: var(--primary); background: var(--primary-light); cursor: default; }
  .slot.closed { border-color: var(--gray-200); color: var(--gray-400); background: var(--gray-100); cursor: not-allowed; font-size: .75rem; }

  /* BOOKING FORM */
  .form-group { margin-bottom: .85rem; }
  label { display: block; font-size: .85rem; font-weight: 500; margin-bottom: .3rem; color: var(--gray-600); }
  input, textarea, select { width: 100%; padding: .55rem .75rem; border: 1.5px solid var(--gray-200); border-radius: 8px; font-size: .9rem; transition: border-color .15s; font-family: inherit; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--primary); }
  textarea { resize: vertical; min-height: 70px; }

  /* BUTTONS */
  .btn { display: inline-flex; align-items: center; gap: .4rem; padding: .55rem 1.1rem; border: none; border-radius: 8px; font-size: .9rem; font-weight: 600; cursor: pointer; transition: all .15s; }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-danger { background: var(--danger); color: white; }
  .btn-danger:hover { background: #DC2626; }
  .btn-outline { background: white; color: var(--gray-800); border: 1.5px solid var(--gray-200); }
  .btn-outline:hover { background: var(--gray-100); }
  .btn-success { background: var(--success); color: white; }
  .btn-sm { padding: .3rem .65rem; font-size: .8rem; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn-google { background: white; border: 1.5px solid var(--gray-200); color: var(--gray-800); padding: .7rem 1.5rem; font-size: .95rem; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
  .btn-google:hover { background: var(--gray-50); box-shadow: 0 2px 6px rgba(0,0,0,.15); }

  /* MY BOOKINGS */
  .booking-item { display: flex; align-items: center; justify-content: space-between; padding: .75rem 0; border-bottom: 1px solid var(--gray-100); }
  .booking-item:last-child { border-bottom: none; }
  .booking-info .date { font-weight: 600; font-size: .9rem; }
  .booking-info .time { color: var(--gray-600); font-size: .85rem; }
  .booking-info .service { font-size: .82rem; color: var(--primary); background: var(--primary-light); padding: 2px 8px; border-radius: 9999px; display: inline-block; margin-top: .2rem; }
  .booking-actions { display: flex; gap: .4rem; }
  .status-badge { display: inline-block; padding: 2px 8px; border-radius: 9999px; font-size: .75rem; font-weight: 600; }
  .status-confirmed { background: #D1FAE5; color: #065F46; }
  .status-cancelled { background: #FEE2E2; color: #991B1B; }

  /* ADMIN */
  .admin-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: .75rem; margin-bottom: 1rem; }
  .stat-card { background: white; border-radius: 10px; border: 1px solid var(--gray-200); padding: 1rem; text-align: center; }
  .stat-number { font-size: 1.8rem; font-weight: 700; color: var(--primary); }
  .stat-label { font-size: .78rem; color: var(--gray-600); margin-top: .2rem; }
  .admin-slot-row { display: flex; align-items: center; justify-content: space-between; padding: .65rem .75rem; border-radius: 8px; margin-bottom: .4rem; border: 1px solid var(--gray-200); }
  .admin-slot-row.booked-row { background: #FFF7ED; border-color: #FED7AA; }
  .admin-slot-row.empty-row { background: var(--gray-50); }
  .slot-time { font-weight: 600; font-size: .9rem; min-width: 55px; }
  .slot-customer { font-size: .88rem; color: var(--gray-600); flex: 1; padding: 0 .75rem; }
  .toggle-switch { position: relative; display: inline-block; width: 44px; height: 24px; }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: var(--gray-200); border-radius: 24px; transition: .3s; }
  .toggle-slider:before { content: ""; position: absolute; height: 18px; width: 18px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .3s; }
  input:checked + .toggle-slider { background: var(--success); }
  input:checked + .toggle-slider:before { transform: translateX(20px); }

  /* SETTINGS */
  .settings-section { margin-bottom: 1.25rem; }
  .chip-list { display: flex; flex-wrap: wrap; gap: .4rem; margin-top: .5rem; }
  .chip { background: var(--primary-light); color: var(--primary); padding: .25rem .6rem; border-radius: 9999px; font-size: .82rem; font-weight: 500; display: flex; align-items: center; gap: .3rem; }
  .chip-remove { cursor: pointer; font-size: 1rem; line-height: 1; color: var(--primary-dark); }

  /* LOGIN PAGE */
  .login-page { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: calc(100vh - 60px); text-align: center; padding: 2rem; }
  .login-page h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: .5rem; }
  .login-page p { color: var(--gray-600); margin-bottom: 2rem; }
  .login-icon { font-size: 3rem; margin-bottom: 1rem; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 1rem; }
  .modal { background: white; border-radius: 14px; padding: 1.5rem; width: 100%; max-width: 440px; }
  .modal-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 1rem; }
  .modal-actions { display: flex; justify-content: flex-end; gap: .5rem; margin-top: 1.25rem; }
  .hidden { display: none !important; }

  /* TOAST */
  .toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 300; display: flex; flex-direction: column; gap: .5rem; }
  .toast { background: var(--gray-800); color: white; padding: .65rem 1rem; border-radius: 8px; font-size: .88rem; animation: slideIn .2s ease; max-width: 280px; }
  .toast.success { background: var(--success); }
  .toast.error { background: var(--danger); }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  .divider { border: none; border-top: 1px solid var(--gray-200); margin: .5rem 0; }
  .text-sm { font-size: .85rem; color: var(--gray-600); }
  .flex { display: flex; }
  .justify-between { justify-content: space-between; }
  .items-center { align-items: center; }
  .gap-2 { gap: .5rem; }
  .mt-1 { margin-top: .25rem; }
  .info-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: .5rem; }

  @media (max-width: 480px) {
    .admin-stats { grid-template-columns: repeat(3, 1fr); }
    .stat-number { font-size: 1.4rem; }
    .slots-grid { grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-brand">✂️ <span id="serviceName">服務預約</span></div>
  <div class="tab-nav" id="tabNav" style="display:none">
    <button class="tab-btn active" data-page="user">預約</button>
    <button class="tab-btn" data-page="admin" id="adminTab" style="display:none">管理</button>
  </div>
  <div class="nav-user">
    <div id="navUser" style="display:none; align-items:center; gap:.6rem; display:none">
      <div class="avatar-placeholder" id="avatarPlaceholder">U</div>
      <span class="nav-name" id="navName"></span>
      <span class="badge-admin hidden" id="adminBadge">管理員</span>
      <button class="btn btn-outline btn-sm" onclick="signOut()">登出</button>
    </div>
    <div id="navLogin">
      <button class="btn btn-google" onclick="signInWithGoogle()">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Google 登入
      </button>
    </div>
  </div>
</nav>

<!-- MAIN -->
<main>

  <!-- LOGIN PAGE -->
  <div id="loginPage" class="login-page">
    <div class="login-icon">📅</div>
    <h1>服務預約系統</h1>
    <p>請使用 Google 帳號登入以開始預約</p>
    <button class="btn btn-google" style="font-size:1rem;padding:.8rem 2rem" onclick="signInWithGoogle()">
      <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      使用 Google 登入
    </button>
  </div>

  <!-- USER PAGE -->
  <div id="userPage" class="page">

    <!-- Announcement -->
    <div class="announcement" id="announcementBlock">
      <h3>📢 公告</h3>
      <p id="announcementText">歡迎使用線上預約系統！如有疑問請來電洽詢。</p>
    </div>

    <!-- Calendar -->
    <div class="card">
      <div class="card-title">選擇日期</div>
      <div class="calendar-header">
        <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
        <h3 id="calMonthTitle"></h3>
        <button class="cal-nav" onclick="changeMonth(1)">›</button>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <!-- Slots -->
    <div class="card" id="slotsCard" style="display:none">
      <div class="flex justify-between items-center" style="margin-bottom:.75rem">
        <div class="card-title" style="margin:0">選擇時段 — <span id="selectedDateLabel"></span></div>
        <div id="dayClosedBadge" class="hidden" style="background:#FEE2E2;color:#991B1B;font-size:.78rem;padding:2px 8px;border-radius:9999px;font-weight:600">休息日</div>
      </div>
      <div class="slots-grid" id="slotsGrid"></div>
    </div>

    <!-- Booking Form -->
    <div class="card" id="bookingFormCard" style="display:none">
      <div class="card-title">填寫預約資料</div>
      <div class="info-row">
        <span class="text-sm">日期 / 時段</span>
        <span style="font-weight:600;font-size:.9rem" id="bookingSummary"></span>
      </div>
      <hr class="divider">
      <div class="form-group">
        <label>姓名</label>
        <input type="text" id="bookingName" placeholder="請輸入姓名">
      </div>
      <div class="form-group">
        <label>電話</label>
        <input type="tel" id="bookingPhone" placeholder="請輸入聯絡電話">
      </div>
      <div class="form-group">
        <label>服務項目</label>
        <select id="bookingService">
          <option value="">請選擇服務</option>
        </select>
      </div>
      <div class="form-group">
        <label>備註（選填）</label>
        <textarea id="bookingNote" placeholder="其他需求說明..."></textarea>
      </div>
      <div style="display:flex;gap:.5rem;justify-content:flex-end">
        <button class="btn btn-outline" onclick="cancelBookingForm()">取消</button>
        <button class="btn btn-primary" onclick="submitBooking()">確認預約</button>
      </div>
    </div>

    <!-- My Bookings -->
    <div class="card">
      <div class="card-title">我的預約</div>
      <div id="myBookingsList">
        <p class="text-sm" style="text-align:center;padding:1rem 0;color:var(--gray-400)">尚無預約紀錄</p>
      </div>
    </div>
  </div>

  <!-- ADMIN PAGE -->
  <div id="adminPage" class="page">

    <!-- Today Stats -->
    <div class="admin-stats" id="adminStats">
      <div class="stat-card">
        <div class="stat-number" id="statTotal">0</div>
        <div class="stat-label">總時段</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="statBooked" style="color:var(--warning)">0</div>
        <div class="stat-label">已預約</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="statAvail" style="color:var(--success)">0</div>
        <div class="stat-label">可預約</div>
      </div>
    </div>

    <!-- Today Schedule -->
    <div class="card">
      <div class="flex justify-between items-center" style="margin-bottom:.75rem">
        <div>
          <div class="card-title" style="margin:0">今日預約</div>
          <div class="text-sm" id="adminTodayLabel"></div>
        </div>
        <div class="flex items-center gap-2">
          <span class="text-sm">開放預約</span>
          <label class="toggle-switch">
            <input type="checkbox" id="todayToggle" onchange="toggleTodayOpen()">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
      <div id="adminSlotList"></div>
      <div style="margin-top:.75rem">
        <button class="btn btn-outline btn-sm" onclick="openAdminBookModal()">＋ 新增預約</button>
      </div>
    </div>

    <!-- Manage Bookings -->
    <div class="card">
      <div class="card-title">預約管理</div>
      <div style="display:flex;gap:.5rem;margin-bottom:.75rem;flex-wrap:wrap">
        <input type="date" id="filterDate" style="flex:1;min-width:120px" onchange="filterBookings()">
        <input type="text" id="filterKeyword" placeholder="搜尋姓名/電話" style="flex:2;min-width:140px" oninput="filterBookings()">
      </div>
      <div id="adminBookingList"></div>
    </div>

    <!-- Settings -->
    <div class="card">
      <div class="card-title">系統設定</div>

      <div class="settings-section">
        <label>服務名稱</label>
        <div class="flex gap-2 mt-1">
          <input type="text" id="settingServiceName" placeholder="如：王氏牙醫診所">
          <button class="btn btn-outline btn-sm" onclick="saveServiceName()">儲存</button>
        </div>
      </div>

      <div class="settings-section">
        <label>可預約區間</label>
        <div class="flex gap-2 mt-1">
          <select id="settingBookingWindow" style="flex:1">
            <option value="1">1 週內</option>
            <option value="2" selected>2 週內</option>
            <option value="3">3 週內</option>
            <option value="4">4 週內</option>
          </select>
          <button class="btn btn-outline btn-sm" onclick="saveBookingWindow()">儲存</button>
        </div>
      </div>

      <div class="settings-section">
        <label>服務項目</label>
        <div class="flex gap-2 mt-1">
          <input type="text" id="newServiceType" placeholder="新增服務項目">
          <button class="btn btn-outline btn-sm" onclick="addServiceType()">新增</button>
        </div>
        <div class="chip-list" id="serviceTypeList"></div>
      </div>

      <div class="settings-section">
        <label>預設時段範本（每日）</label>
        <div class="flex gap-2 mt-1">
          <input type="time" id="newSlotTime">
          <button class="btn btn-outline btn-sm" onclick="addSlotTemplate()">新增</button>
        </div>
        <div class="chip-list" id="slotTemplateList"></div>
        <div style="margin-top:.6rem">
          <button class="btn btn-primary btn-sm" onclick="applyTemplateToDay()">套用範本到選擇的日期</button>
        </div>
      </div>

      <div class="settings-section">
        <label>公告內容</label>
        <div class="flex gap-2 mt-1" style="flex-direction:column">
          <textarea id="settingAnnouncement" placeholder="輸入公告內容..."></textarea>
          <button class="btn btn-primary btn-sm" onclick="saveAnnouncement()" style="align-self:flex-end">儲存公告</button>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- MODAL: Admin Add/Edit Booking -->
<div class="modal-overlay hidden" id="adminBookModal">
  <div class="modal">
    <div class="modal-title" id="adminModalTitle">新增預約</div>
    <div class="form-group">
      <label>日期</label>
      <input type="date" id="adminBookDate">
    </div>
    <div class="form-group">
      <label>時段</label>
      <select id="adminBookSlot"></select>
    </div>
    <div class="form-group">
      <label>姓名</label>
      <input type="text" id="adminBookName" placeholder="客戶姓名">
    </div>
    <div class="form-group">
      <label>電話</label>
      <input type="tel" id="adminBookPhone" placeholder="聯絡電話">
    </div>
    <div class="form-group">
      <label>服務項目</label>
      <select id="adminBookService"></select>
    </div>
    <div class="form-group">
      <label>備註</label>
      <textarea id="adminBookNote" placeholder="備註..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('adminBookModal')">取消</button>
      <button class="btn btn-primary" onclick="confirmAdminBook()">確認</button>
    </div>
  </div>
</div>

<!-- MODAL: Confirm Cancel -->
<div class="modal-overlay hidden" id="confirmModal">
  <div class="modal">
    <div class="modal-title">確認取消預約？</div>
    <p class="text-sm">此操作無法復原，確定要取消這筆預約嗎？</p>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('confirmModal')">返回</button>
      <button class="btn btn-danger" id="confirmCancelBtn">確認取消</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast-container" id="toastContainer"></div>

<script type="module">
// ─── Firebase SDK ───────────────────────────────────────────────────────────
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut as fbSignOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, deleteDoc,
         collection, query, where, getDocs, onSnapshot, serverTimestamp, writeBatch }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ─── CONFIG (替換成你的 Firebase 設定) ─────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyA_Rx6OHmVw-5vEUA9ZqYpC-2EnzBqZKEw",
  authDomain: "ychao-booking-schedule.firebaseapp.com",
  projectId: "ychao-booking-schedule",
  storageBucket: "ychao-booking-schedule.firebasestorage.app",
  messagingSenderId: "885880899717",
  appId: "1:885880899717:web:62093f3b36f1a33e6241ec"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ─── STATE ──────────────────────────────────────────────────────────────────
let currentUser = null;
let isAdmin = false;
let settings = {
  serviceName: "服務預約",
  bookingWindowWeeks: 2,
  announcement: "歡迎使用線上預約系統！如有疑問請來電洽詢。",
  serviceTypes: ["一般服務", "加強方案"],
  slotTemplates: ["09:00","09:30","10:00","10:30","11:00","14:00","14:30","15:00","15:30","16:00"]
};
let calYear, calMonth;
let selectedDate = null;
let selectedSlot = null;
let dailyData = {};      // { "2026-06-07": { isOpen, slots:{time:{status,bookingId}} } }
let allBookings = [];    // 所有預約 (admin)
let myBookings = [];     // 使用者自己的預約
let editingBookingId = null;

// ─── INIT ───────────────────────────────────────────────────────────────────
const today = new Date();
calYear = today.getFullYear();
calMonth = today.getMonth();

onAuthStateChanged(auth, async user => {
  if (user) {
    currentUser = user;
    await ensureUserDoc(user);
    await loadSettings();
    checkAdmin();
    setupUI();
    loadMyBookings();
    if (isAdmin) loadAdminData();
  } else {
    currentUser = null;
    isAdmin = false;
    showLoginPage();
  }
});

// ─── AUTH ───────────────────────────────────────────────────────────────────
window.signInWithGoogle = async () => {
  try {
    await signInWithPopup(auth, new GoogleAuthProvider());
  } catch(e) { toast("登入失敗：" + e.message, "error"); }
};
window.signOut = () => fbSignOut(auth);

async function ensureUserDoc(user) {
  const ref = doc(db, "users", user.uid);
  const snap = await getDoc(ref);
  if (!snap.exists()) {
    await setDoc(ref, {
      displayName: user.displayName,
      email: user.email,
      role: "user",
      createdAt: serverTimestamp()
    });
  }
}

async function checkAdmin() {
  const snap = await getDoc(doc(db, "users", currentUser.uid));
  isAdmin = snap.exists() && snap.data().role === "admin";
}

// ─── SETTINGS ───────────────────────────────────────────────────────────────
async function loadSettings() {
  const snap = await getDoc(doc(db, "settings", "global"));
  if (snap.exists()) Object.assign(settings, snap.data());
  applySettings();
}

function applySettings() {
  document.getElementById("serviceName").textContent = settings.serviceName;
  document.getElementById("announcementText").textContent = settings.announcement;
  document.getElementById("settingServiceName").value = settings.serviceName;
  document.getElementById("settingAnnouncement").value = settings.announcement;
  document.getElementById("settingBookingWindow").value = settings.bookingWindowWeeks;
  renderServiceTypes();
  renderSlotTemplates();
  populateServiceSelects();
  renderCalendar();
}

async function saveSettings(patch) {
  Object.assign(settings, patch);
  await setDoc(doc(db, "settings", "global"), settings, { merge: true });
  applySettings();
  toast("設定已儲存");
}

window.saveServiceName = () => saveSettings({ serviceName: document.getElementById("settingServiceName").value.trim() || "服務預約" });
window.saveBookingWindow = () => saveSettings({ bookingWindowWeeks: parseInt(document.getElementById("settingBookingWindow").value) });
window.saveAnnouncement = () => saveSettings({ announcement: document.getElementById("settingAnnouncement").value.trim() });

window.addServiceType = () => {
  const v = document.getElementById("newServiceType").value.trim();
  if (!v || settings.serviceTypes.includes(v)) return;
  document.getElementById("newServiceType").value = "";
  saveSettings({ serviceTypes: [...settings.serviceTypes, v] });
};
window.removeServiceType = (s) => saveSettings({ serviceTypes: settings.serviceTypes.filter(x => x !== s) });

window.addSlotTemplate = () => {
  const v = document.getElementById("newSlotTime").value;
  if (!v || settings.slotTemplates.includes(v)) return;
  const sorted = [...settings.slotTemplates, v].sort();
  saveSettings({ slotTemplates: sorted });
};
window.removeSlotTemplate = (s) => saveSettings({ slotTemplates: settings.slotTemplates.filter(x => x !== s) });

window.applyTemplateToDay = async () => {
  const dateStr = document.getElementById("adminBookDate").value || dateToString(today);
  const slots = {};
  settings.slotTemplates.forEach(t => { slots[t] = { status: "available" }; });
  await setDoc(doc(db, "dailySchedules", dateStr), { isOpen: true, slots }, { merge: false });
  toast(`已套用範本到 ${dateStr}`);
  loadDailyData(dateStr);
};

function renderServiceTypes() {
  document.getElementById("serviceTypeList").innerHTML = settings.serviceTypes
    .map(s => `<span class="chip">${s}<span class="chip-remove" onclick="removeServiceType('${s}')">×</span></span>`).join("");
}
function renderSlotTemplates() {
  document.getElementById("slotTemplateList").innerHTML = settings.slotTemplates
    .map(s => `<span class="chip">${s}<span class="chip-remove" onclick="removeSlotTemplate('${s}')">×</span></span>`).join("");
}
function populateServiceSelects() {
  const opts = ["<option value=''>請選擇服務</option>",
    ...settings.serviceTypes.map(s => `<option value="${s}">${s}</option>`)].join("");
  ["bookingService","adminBookService"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = opts;
  });
}

// ─── UI SETUP ───────────────────────────────────────────────────────────────
function setupUI() {
  document.getElementById("loginPage").style.display = "none";
  document.getElementById("userPage").classList.add("active");
  document.getElementById("tabNav").style.display = "flex";
  document.getElementById("navLogin").style.display = "none";
  document.getElementById("navUser").style.display = "flex";
  document.getElementById("navName").textContent = currentUser.displayName || currentUser.email;
  const initial = (currentUser.displayName || "U")[0].toUpperCase();
  document.getElementById("avatarPlaceholder").textContent = initial;
  if (isAdmin) {
    document.getElementById("adminTab").style.display = "";
    document.getElementById("adminBadge").classList.remove("hidden");
  }
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => switchPage(btn.dataset.page));
  });
  renderCalendar();
  renderAdminToday();
}

function showLoginPage() {
  document.getElementById("loginPage").style.display = "";
  document.getElementById("userPage").classList.remove("active");
  document.getElementById("adminPage").classList.remove("active");
  document.getElementById("tabNav").style.display = "none";
  document.getElementById("navLogin").style.display = "";
  document.getElementById("navUser").style.display = "none";
}

function switchPage(page) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(page + "Page").classList.add("active");
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.page === page));
  if (page === "admin") { renderAdminToday(); filterBookings(); }
}

// ─── CALENDAR ───────────────────────────────────────────────────────────────
window.changeMonth = (d) => { calMonth += d; if (calMonth > 11) { calMonth=0; calYear++; } if (calMonth < 0) { calMonth=11; calYear--; } renderCalendar(); };

function renderCalendar() {
  const grid = document.getElementById("calendarGrid");
  const title = document.getElementById("calMonthTitle");
  const now = new Date(); now.setHours(0,0,0,0);
  const maxDate = new Date(now); maxDate.setDate(now.getDate() + settings.bookingWindowWeeks * 7);

  title.textContent = `${calYear} 年 ${calMonth+1} 月`;
  const dayNames = ["日","一","二","三","四","五","六"];
  grid.innerHTML = dayNames.map(d => `<div class="cal-day-name">${d}</div>`).join("");

  const first = new Date(calYear, calMonth, 1).getDay();
  for (let i=0; i<first; i++) grid.innerHTML += `<div class="cal-day empty"></div>`;

  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  for (let d=1; d<=daysInMonth; d++) {
    const dateObj = new Date(calYear, calMonth, d);
    const dateStr = dateToString(dateObj);
    const isPast = dateObj < now;
    const isFuture = dateObj > maxDate;
    const isToday = dateStr === dateToString(now);
    const isSel = dateStr === selectedDate;
    let cls = "cal-day";
    if (isPast || isFuture) cls += " disabled";
    if (isToday) cls += " today";
    if (isSel) cls += " selected";
    const onclick = (!isPast && !isFuture) ? `onclick="selectDate('${dateStr}')"` : "";
    grid.innerHTML += `<div class="${cls}" ${onclick}>${d}</div>`;
  }
}

window.selectDate = async (dateStr) => {
  selectedDate = dateStr;
  selectedSlot = null;
  renderCalendar();
  document.getElementById("slotsCard").style.display = "";
  document.getElementById("bookingFormCard").style.display = "none";
  document.getElementById("selectedDateLabel").textContent = formatDate(dateStr);
  await loadDailyData(dateStr);
  renderSlots(dateStr);
};

// ─── DAILY DATA ─────────────────────────────────────────────────────────────
async function loadDailyData(dateStr) {
  const snap = await getDoc(doc(db, "dailySchedules", dateStr));
  if (snap.exists()) {
    dailyData[dateStr] = snap.data();
  } else {
    // 自動從範本建立
    const slots = {};
    settings.slotTemplates.forEach(t => { slots[t] = { status: "available" }; });
    dailyData[dateStr] = { isOpen: true, slots };
  }
}

function renderSlots(dateStr) {
  const data = dailyData[dateStr];
  const grid = document.getElementById("slotsGrid");
  const closedBadge = document.getElementById("dayClosedBadge");
  if (!data || !data.isOpen) {
    closedBadge.classList.remove("hidden");
    grid.innerHTML = `<p class="text-sm" style="color:var(--gray-400);padding:.5rem 0">此日期不開放預約</p>`;
    return;
  }
  closedBadge.classList.add("hidden");
  const myBookingTimes = new Set(myBookings.filter(b=>b.date===dateStr && b.status==="confirmed").map(b=>b.time));
  grid.innerHTML = Object.entries(data.slots).sort(([a],[b])=>a.localeCompare(b)).map(([time, slot]) => {
    if (myBookingTimes.has(time)) return `<div class="slot mine" title="您已預約此時段">✓ ${time}</div>`;
    if (slot.status === "booked") return `<div class="slot booked">${time}</div>`;
    const sel = time === selectedSlot ? " selected" : "";
    return `<div class="slot available${sel}" onclick="selectSlot('${time}')">${time}</div>`;
  }).join("");
}

window.selectSlot = (time) => {
  selectedSlot = time;
  renderSlots(selectedDate);
  const card = document.getElementById("bookingFormCard");
  card.style.display = "";
  document.getElementById("bookingSummary").textContent = `${formatDate(selectedDate)} ${time}`;
  card.scrollIntoView({ behavior: "smooth", block: "nearest" });
};

window.cancelBookingForm = () => {
  selectedSlot = null;
  document.getElementById("bookingFormCard").style.display = "none";
  renderSlots(selectedDate);
};

// ─── BOOKINGS ────────────────────────────────────────────────────────────────
window.submitBooking = async () => {
  const name = document.getElementById("bookingName").value.trim();
  const phone = document.getElementById("bookingPhone").value.trim();
  const service = document.getElementById("bookingService").value;
  const note = document.getElementById("bookingNote").value.trim();
  if (!name || !phone || !service) { toast("請填寫姓名、電話與服務項目", "error"); return; }
  if (!selectedDate || !selectedSlot) { toast("請選擇日期與時段", "error"); return; }
  try {
    const bookingId = `${currentUser.uid}_${selectedDate}_${selectedSlot}`.replace(/:/g,"");
    const data = {
      userId: currentUser.uid, userName: name, userPhone: phone,
      date: selectedDate, time: selectedSlot, service, note,
      status: "confirmed", createdAt: serverTimestamp()
    };
    const batch = writeBatch(db);
    batch.set(doc(db, "bookings", bookingId), data);
    batch.set(doc(db, "dailySchedules", selectedDate), {
      slots: { [selectedSlot]: { status: "booked", bookingId } }
    }, { merge: true });
    await batch.commit();
    toast("預約成功！", "success");
    document.getElementById("bookingFormCard").style.display = "none";
    selectedSlot = null;
    await loadDailyData(selectedDate);
    renderSlots(selectedDate);
    loadMyBookings();
  } catch(e) { toast("預約失敗：" + e.message, "error"); }
};

async function loadMyBookings() {
  const q = query(collection(db,"bookings"), where("userId","==",currentUser.uid), where("status","==","confirmed"));
  const snap = await getDocs(q);
  myBookings = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  myBookings.sort((a,b) => a.date.localeCompare(b.date) || a.time.localeCompare(b.time));
  renderMyBookings();
}

function renderMyBookings() {
  const list = document.getElementById("myBookingsList");
  if (!myBookings.length) {
    list.innerHTML = `<p class="text-sm" style="text-align:center;padding:1rem 0;color:var(--gray-400)">尚無預約紀錄</p>`;
    return;
  }
  list.innerHTML = myBookings.map(b => `
    <div class="booking-item">
      <div class="booking-info">
        <div class="date">${formatDate(b.date)} ${b.time}</div>
        <div class="service">${b.service}</div>
        ${b.note ? `<div class="time">${b.note}</div>` : ""}
      </div>
      <div class="booking-actions">
        <button class="btn btn-outline btn-sm" onclick="rescheduleBooking('${b.id}')">改期</button>
        <button class="btn btn-danger btn-sm" onclick="askCancelBooking('${b.id}')">取消</button>
      </div>
    </div>`).join("");
}

window.askCancelBooking = (id) => {
  document.getElementById("confirmModal").classList.remove("hidden");
  document.getElementById("confirmCancelBtn").onclick = () => cancelBooking(id);
};

async function cancelBooking(id) {
  const booking = myBookings.find(b => b.id === id) || allBookings.find(b => b.id === id);
  if (!booking) return;
  try {
    const batch = writeBatch(db);
    batch.update(doc(db,"bookings",id), { status: "cancelled" });
    batch.set(doc(db,"dailySchedules",booking.date), {
      slots: { [booking.time]: { status: "available", bookingId: null } }
    }, { merge: true });
    await batch.commit();
    toast("已取消預約");
    closeModal("confirmModal");
    loadMyBookings();
    if (isAdmin) loadAdminData();
    if (selectedDate === booking.date) { await loadDailyData(selectedDate); renderSlots(selectedDate); }
  } catch(e) { toast("取消失敗", "error"); }
}

window.rescheduleBooking = async (id) => {
  const b = myBookings.find(x => x.id === id);
  if (!b) return;
  await cancelBooking(id);
  toast("請重新選擇時段");
};

// ─── ADMIN ───────────────────────────────────────────────────────────────────
async function loadAdminData() {
  const snap = await getDocs(collection(db, "bookings"));
  allBookings = snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(b => b.status === "confirmed");
  allBookings.sort((a,b) => a.date.localeCompare(b.date) || a.time.localeCompare(b.time));
  renderAdminToday();
  filterBookings();
}

function renderAdminToday() {
  const todayStr = dateToString(today);
  document.getElementById("adminTodayLabel").textContent = formatDate(todayStr);
  loadDailyData(todayStr).then(() => {
    const data = dailyData[todayStr] || { isOpen: false, slots: {} };
    document.getElementById("todayToggle").checked = !!data.isOpen;
    const slots = Object.entries(data.slots || {}).sort(([a],[b])=>a.localeCompare(b));
    const booked = allBookings.filter(b => b.date === todayStr);
    const total = slots.length;
    const bookedCount = booked.length;
    document.getElementById("statTotal").textContent = total;
    document.getElementById("statBooked").textContent = bookedCount;
    document.getElementById("statAvail").textContent = total - bookedCount;
    const list = document.getElementById("adminSlotList");
    list.innerHTML = slots.map(([time, slot]) => {
      const booking = booked.find(b => b.time === time);
      if (booking) {
        return `<div class="admin-slot-row booked-row">
          <span class="slot-time">${time}</span>
          <span class="slot-customer">${booking.userName} · ${booking.userPhone}<br><small>${booking.service}</small></span>
          <div class="flex gap-2">
            <button class="btn btn-outline btn-sm" onclick="openEditBookModal('${booking.id}')">✏</button>
            <button class="btn btn-danger btn-sm" onclick="askCancelBooking('${booking.id}')">✕</button>
          </div>
        </div>`;
      }
      return `<div class="admin-slot-row empty-row">
        <span class="slot-time">${time}</span>
        <span class="slot-customer" style="color:var(--gray-400)">空閒</span>
        <button class="btn btn-outline btn-sm" onclick="openAdminBookModal('${todayStr}','${time}')">預約</button>
      </div>`;
    }).join("") || `<p class="text-sm" style="color:var(--gray-400);padding:.5rem 0">尚未設定今日時段</p>`;
  });
}

window.toggleTodayOpen = async () => {
  const todayStr = dateToString(today);
  const isOpen = document.getElementById("todayToggle").checked;
  await setDoc(doc(db,"dailySchedules",todayStr), { isOpen }, { merge: true });
  toast(isOpen ? "已開放今日預約" : "已關閉今日預約");
};

window.filterBookings = () => {
  const dateFilter = document.getElementById("filterDate").value;
  const keyword = document.getElementById("filterKeyword").value.trim().toLowerCase();
  let list = allBookings;
  if (dateFilter) list = list.filter(b => b.date === dateFilter);
  if (keyword) list = list.filter(b =>
    b.userName?.toLowerCase().includes(keyword) ||
    b.userPhone?.includes(keyword)
  );
  const el = document.getElementById("adminBookingList");
  el.innerHTML = list.length ? list.map(b => `
    <div class="booking-item">
      <div class="booking-info">
        <div class="date">${formatDate(b.date)} ${b.time}</div>
        <div class="time">${b.userName} · ${b.userPhone}</div>
        <div class="service">${b.service}</div>
      </div>
      <div class="booking-actions">
        <button class="btn btn-outline btn-sm" onclick="openEditBookModal('${b.id}')">✏</button>
        <button class="btn btn-danger btn-sm" onclick="askCancelBooking('${b.id}')">✕</button>
      </div>
    </div>`).join("")
    : `<p class="text-sm" style="text-align:center;padding:1rem 0;color:var(--gray-400)">無符合條件的預約</p>`;
};

// ─── ADMIN MODAL ─────────────────────────────────────────────────────────────
window.openAdminBookModal = async (dateStr, slotTime) => {
  editingBookingId = null;
  document.getElementById("adminModalTitle").textContent = "新增預約";
  document.getElementById("adminBookDate").value = dateStr || dateToString(today);
  document.getElementById("adminBookName").value = "";
  document.getElementById("adminBookPhone").value = "";
  document.getElementById("adminBookNote").value = "";
  await loadAdminSlots(dateStr || dateToString(today));
  if (slotTime) document.getElementById("adminBookSlot").value = slotTime;
  document.getElementById("adminBookModal").classList.remove("hidden");
};

window.openEditBookModal = async (id) => {
  editingBookingId = id;
  const b = allBookings.find(x => x.id === id);
  if (!b) return;
  document.getElementById("adminModalTitle").textContent = "修改預約";
  document.getElementById("adminBookDate").value = b.date;
  document.getElementById("adminBookName").value = b.userName;
  document.getElementById("adminBookPhone").value = b.userPhone;
  document.getElementById("adminBookNote").value = b.note || "";
  await loadAdminSlots(b.date, id);
  document.getElementById("adminBookSlot").value = b.time;
  document.getElementById("adminBookService").value = b.service;
  document.getElementById("adminBookModal").classList.remove("hidden");
};

document.getElementById("adminBookDate").addEventListener("change", async (e) => {
  await loadAdminSlots(e.target.value, editingBookingId);
});

async function loadAdminSlots(dateStr, excludeBookingId) {
  await loadDailyData(dateStr);
  const data = dailyData[dateStr];
  const sel = document.getElementById("adminBookSlot");
  sel.innerHTML = "";
  if (!data) { sel.innerHTML = "<option>無時段</option>"; return; }
  Object.entries(data.slots).sort(([a],[b])=>a.localeCompare(b)).forEach(([time, slot]) => {
    const b = allBookings.find(x => x.time === time && x.date === dateStr && x.id !== excludeBookingId);
    const disabled = slot.status === "booked" && !b?.id === excludeBookingId ? "" : "";
    sel.innerHTML += `<option value="${time}" ${b ? "disabled" : ""}>${time}${b ? " (已預約)" : ""}</option>`;
  });
}

window.confirmAdminBook = async () => {
  const date = document.getElementById("adminBookDate").value;
  const time = document.getElementById("adminBookSlot").value;
  const name = document.getElementById("adminBookName").value.trim();
  const phone = document.getElementById("adminBookPhone").value.trim();
  const service = document.getElementById("adminBookService").value;
  const note = document.getElementById("adminBookNote").value.trim();
  if (!date||!time||!name||!phone||!service) { toast("請填寫所有必要欄位","error"); return; }
  const batch = writeBatch(db);
  if (editingBookingId) {
    const old = allBookings.find(b => b.id === editingBookingId);
    if (old && (old.date !== date || old.time !== time)) {
      batch.set(doc(db,"dailySchedules",old.date),{slots:{[old.time]:{status:"available",bookingId:null}}},{merge:true});
    }
    batch.update(doc(db,"bookings",editingBookingId), { date,time,userName:name,userPhone:phone,service,note });
    batch.set(doc(db,"dailySchedules",date),{slots:{[time]:{status:"booked",bookingId:editingBookingId}}},{merge:true});
  } else {
    const bookingId = `admin_${date}_${time}_${Date.now()}`.replace(/:/g,"");
    batch.set(doc(db,"bookings",bookingId), {
      userId:"admin", userName:name, userPhone:phone, date, time, service, note,
      status:"confirmed", createdAt:serverTimestamp()
    });
    batch.set(doc(db,"dailySchedules",date),{slots:{[time]:{status:"booked",bookingId}}},{merge:true});
  }
  await batch.commit();
  toast("預約已儲存","success");
  closeModal("adminBookModal");
  loadAdminData();
};

// ─── UTILS ───────────────────────────────────────────────────────────────────
window.closeModal = (id) => document.getElementById(id).classList.add("hidden");

function dateToString(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function formatDate(s) {
  const [y,m,d] = s.split("-");
  const days = ["日","一","二","三","四","五","六"];
  const day = days[new Date(s).getDay()];
  return `${m}/${d} (${day})`;
}

function toast(msg, type="") {
  const el = document.createElement("div");
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById("toastContainer").appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// close modal on overlay click
document.querySelectorAll(".modal-overlay").forEach(el => {
  el.addEventListener("click", e => { if (e.target === el) el.classList.add("hidden"); });
});
</script>
